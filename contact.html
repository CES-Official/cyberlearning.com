				    <style>
					   /* Slider container */

.slider {
    position: relative;
    max-width: 100%;
    margin: 0 auto;
    overflow: hidden;
    height: 40vh; /* Default: 40% of the viewport height */
    max-height: 500px; /* Upper limit for larger screens */
}

/* Slides wrapper */
.slides {
    display: flex;
    transition: transform 0.5s ease;
    width: 100%;
}

/* Each slide */
.slide {
    flex: 0 0 100%; /* Each slide takes up 100% of the slider width */
    box-sizing: border-box;
}

/* Images inside slides */
.slide img {
    width: 100%; /* Image adjusts to the full width of the container */
    height: 100%; /* Image scales to the height of the slider */
    object-fit: cover; /* Ensures no distortion but crops excess if necessary */
}

/* Media queries for responsiveness */
@media (max-width: 1024px) {
    .slider {
        height: 35vh; /* Slightly reduce height for laptops */
        max-height: 400px; /* Upper limit for laptops */
    }
}

@media (max-width: 768px) {
    .slider {
        height: 30vh; /* Further reduce height for tablets */
        max-height: 350px; /* Upper limit for tablets */
    }
}

@media (max-width: 480px) {
    .slider {
        height: 25vh; /* Smallest height for mobile phones */
        max-height: 300px; /* Upper limit for mobile devices */
    }
}


/* Logo slider wrapper */
.logo-slider {
  width: 100%;
  overflow: hidden;
  background: #fff;
  padding: 3vh 0;
}

/* Moving track */
.logo-track {
  display: flex;
  width: max-content;
  animation: logo-scroll 20s linear infinite;
}

/* Individual logo */
.logo {
  flex: 0 0 auto;
  width: 12vw;
  max-width: 160px;
  min-width: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 2vw;
}

/* Image safety */
.logo img {
  width: 100%;
  height: auto;
  object-fit: contain;
  opacity: 0.8;
  transition: filter 0.3s ease, opacity 0.3s ease;
}

/* Animation */
@keyframes my-5{
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-50%);
  }
}

    <script>
        async function loadHtmlPartial(url, targetElementId) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const html = await response.text();
                document.getElementById(targetElementId).innerHTML = html;
            } catch (error) {
                console.error('Error fetching HTML partial:', error);
                document.getElementById(targetElementId).innerHTML =
                    '<p>Error loading content.</p>';
            }
        }

        // Safer than body onload
        document.addEventListener("DOMContentLoaded", () => {
